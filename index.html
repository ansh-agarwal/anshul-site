<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello from Anshul</title>
  <style>
    :root { --bg1:#0f172a; --bg2:#1e293b; --accent:#38bdf8; --accent2:#818cf8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2)); color:#e2e8f0; padding:24px;
      overflow:hidden;
    }
    .card {
      position:relative; max-width:540px; width:100%; text-align:center;
      background:rgba(255,255,255,0.04); backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08); border-radius:24px;
      padding:48px 36px; box-shadow:0 24px 60px rgba(0,0,0,0.4);
      animation:rise .8s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes rise { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:none;} }
    .badge {
      display:inline-block; font-size:13px; letter-spacing:.12em; text-transform:uppercase;
      color:var(--accent); border:1px solid rgba(56,189,248,.3); border-radius:999px;
      padding:6px 14px; margin-bottom:24px;
    }
    h1 {
      font-size:clamp(32px,6vw,46px); line-height:1.1; margin-bottom:16px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    p { font-size:17px; line-height:1.6; color:#94a3b8; margin-bottom:28px; }
    .time { font-size:14px; color:#64748b; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; margin-right:6px;
           box-shadow:0 0 0 rgba(34,197,94,.6); animation:pulse 2s infinite; }
    @keyframes pulse {
      0%{box-shadow:0 0 0 0 rgba(34,197,94,.5);} 70%{box-shadow:0 0 0 10px rgba(34,197,94,0);}
      100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
    }
    .footer { margin-top:32px; font-size:13px; color:#475569; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge"><span class="dot"></span>Live</span>
    <h1>Hello, Anshul 👋</h1>
    <p>Your simple website is up and running — built and deployed for you, hosted on GitHub Pages.</p>
    <p class="time" id="time"></p>
    <div class="footer">Built by Shlokam · just say the word to customise it.</div>
  </div>
  <script>
    document.getElementById('time').textContent =
      'Deployed ' + new Date().toLocaleString('en-IN', { timeZone:'Asia/Calcutta', dateStyle:'medium', timeStyle:'short' }) + ' IST';
  </script>
</body>
</html>
